<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png">
  <title>书架 · 静读</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- PWA：可安装 + 离线 -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1f1e1c" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="静读">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">静读</a>
    <div class="topbar-actions">
      <button id="sync-toggle" class="icon-btn" title="同步阅读进度" aria-label="打开同步阅读进度">同步</button>
      <button id="theme-toggle" class="icon-btn" title="切换深浅色" aria-label="切换深浅色">◐</button>
    </div>
  </header>

  <aside id="sync-panel" class="sync-panel" hidden>
    <div class="sync-head">
      <h2 class="sync-title">同步阅读进度</h2>
    </div>
    <form id="sync-form" class="sync-form">
      <label class="sr-only" for="sync-code">同步码</label>
      <input id="sync-code" class="sync-code" type="text" inputmode="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="输入 4-32 位同步码">
      <div class="sync-actions">
        <button id="sync-save" class="sync-action" type="button">保存</button>
        <button id="sync-restore" class="sync-action" type="button">恢复</button>
      </div>
    </form>
    <p id="sync-status" class="sync-status">同一个同步码可在不同设备间保存或恢复阅读进度。</p>
  </aside>

  <main class="shelf">
    <h1 class="shelf-title">书架</h1>
    <p class="shelf-sub">静态书库</p>
    <ul id="book-list" class="book-list" aria-live="polite">
      <li class="empty">正在加载书目……</li>
    </ul>
  </main>


  <script src="js/common.js"></script>
  <script src="js/shelf.js"></script>
</body>
</html>
